services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: [ "sh", "-c", "python init_sqlite_db.py && (python data_listener.py &) && uvicorn backend_api:app --host 0.0.0.0 --port 8000 --reload" ]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_DOCS_URL=/docs/
      - DOCS_PORT=4000
    ports:
      - "8001:8001"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - ./docs-site:/app/docs-site
      - frontend_node_modules:/app/frontend/node_modules
      - docs_site_node_modules:/app/docs-site/node_modules
    command: [ "sh", "-c", "cd /app/docs-site && npm install && cd /app/frontend && npm install && (cd /app/docs-site && npm run start &) && sleep 25 && cd /app/frontend && npm run dev:only -- --host 0.0.0.0 --port 8001" ]

volumes:
  frontend_node_modules:
  docs_site_node_modules:
