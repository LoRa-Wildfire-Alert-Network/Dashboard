name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/dashboard-backend:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/dashboard-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/dashboard-backend:${{ github.event.release.tag_name || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/dashboard-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/dashboard-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/dashboard-frontend:${{ github.event.release.tag_name || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
